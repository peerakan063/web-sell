<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รีเซ็ตรหัสผ่าน | หนุ่มกล้ามทอง</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#ffd700; --gold2:#ffaa00; --dark:#080810; --dark2:#0f0f1a; --dark3:#161628; --dark4:#1e1e35;
  --text:#e8e8f0; --muted:#7070a0; --green:#22c55e; --red:#ef4444; --orange:#f97316;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Kanit',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
.bg { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse at 30% 40%, rgba(255,140,0,0.1) 0%, transparent 50%), radial-gradient(ellipse at 80% 70%, rgba(255,215,0,0.06) 0%, transparent 50%); }
.bg-grid { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),linear-gradient(90deg,rgba(255,215,0,0.03) 1px,transparent 1px); background-size:40px 40px; }
nav { position:relative; z-index:10; background:rgba(8,8,16,0.9); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,215,0,0.15); padding:0 24px; height:64px; display:flex; align-items:center; }
.nav-logo { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:900; color:var(--gold); text-decoration:none; }
.nav-logo span { color:white; }
.nav-logo .icon { width:36px; height:36px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#000; }
.page { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1; }
.card { width:100%; max-width:400px; background:var(--dark3); border-radius:20px; border:1px solid rgba(255,255,255,0.08); padding:36px; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--orange),var(--gold),var(--orange)); }
.card-logo { text-align:center; margin-bottom:28px; }
.logo-icon { width:56px; height:56px; background:var(--gold); border-radius:14px; display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:10px; }
.card-title { font-size:18px; font-weight:900; color:white; text-align:center; margin-bottom:6px; }
.card-sub { font-size:13px; color:var(--muted); text-align:center; margin-bottom:24px; }
.form { display:flex; flex-direction:column; gap:16px; }
.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:13px; font-weight:600; color:var(--muted); }
.field-wrap { position:relative; }
.field-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
input[type=password] { width:100%; padding:12px 14px 12px 42px; background:var(--dark4); border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:var(--text); font-family:'Kanit',sans-serif; font-size:14px; outline:none; transition:all 0.2s; }
input:focus { border-color:rgba(255,215,0,0.4); background:rgba(255,215,0,0.03); }
input::placeholder { color:var(--muted); }
.btn-submit { width:100%; padding:14px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--orange),#ea6500); color:white; font-family:'Kanit',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(249,115,22,0.4); }
.btn-submit:disabled { background:var(--dark4); color:var(--muted); transform:none; box-shadow:none; cursor:not-allowed; }
.error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px 14px; color:#fca5a5; font-size:13px; display:none; }
.error-msg.show { display:block; }
.success-msg { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:8px; padding:10px 14px; color:#86efac; font-size:13px; display:none; }
.success-msg.show { display:block; }
.expired-box { text-align:center; padding:20px 0; }
.expired-icon { font-size:48px; margin-bottom:12px; }
.expired-title { font-size:16px; font-weight:700; color:var(--red); margin-bottom:8px; }
.expired-sub { font-size:13px; color:var(--muted); margin-bottom:20px; line-height:1.7; }
.btn-link { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--orange),#ea6500); color:white; font-family:'Kanit',sans-serif; font-size:14px; font-weight:700; cursor:pointer; text-decoration:none; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>
<nav>
  <a href="index.html" class="nav-logo">
    <div class="icon">🎮</div>
    <div>หนุ่ม<span>กล้ามทอง</span></div>
  </a>
</nav>
<div class="page">
  <div class="card">
    <div class="card-logo">
      <div class="logo-icon">🔐</div>
    </div>

    <!-- กรณี token ไม่มี -->
    <div id="noToken" style="display:none">
      <div class="expired-box">
        <div class="expired-icon">❌</div>
        <div class="expired-title">ลิงก์ไม่ถูกต้อง</div>
        <div class="expired-sub">ลิงก์นี้ไม่ถูกต้องหรือหมดอายุแล้วครับ<br>กรุณาขอลิงก์รีเซ็ตใหม่</div>
        <a href="auth.html?mode=forgot" class="btn-link">📧 ขอลิงก์ใหม่</a>
      </div>
    </div>

    <!-- ฟอร์มรีเซ็ต -->
    <div id="resetForm">
      <div class="card-title">🔐 ตั้งรหัสผ่านใหม่</div>
      <div class="card-sub">กรอกรหัสผ่านใหม่ของคุณด้านล่างครับ</div>
      <div class="form">
        <div class="error-msg" id="resetError"></div>
        <div class="success-msg" id="resetSuccess"></div>
        <div class="field">
          <label>รหัสผ่านใหม่</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="newPass" placeholder="อย่างน้อย 6 ตัวอักษร">
          </div>
        </div>
        <div class="field">
          <label>ยืนยันรหัสผ่านใหม่</label>
          <div class="field-wrap">
            <span class="field-icon">🔐</span>
            <input type="password" id="newPass2" placeholder="ยืนยันรหัสผ่านอีกครั้ง" onkeydown="if(event.key==='Enter')doReset()">
          </div>
        </div>
        <button class="btn-submit" id="resetBtn" onclick="doReset()">✅ บันทึกรหัสผ่านใหม่</button>
      </div>
    </div>

  </div>
</div>

<script>
const API = "https://web-sell-production.up.railway.app";
const token = new URLSearchParams(location.search).get("token");

// ถ้าไม่มี token ให้แสดง error
if (!token) {
  document.getElementById("noToken").style.display = "block";
  document.getElementById("resetForm").style.display = "none";
}

function showMsg(id, msg, type="error") {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = (type === "error" ? "error-msg" : "success-msg") + " show";
}

async function doReset() {
  const password = document.getElementById("newPass").value;
  const confirm  = document.getElementById("newPass2").value;

  // clear
  ["resetError","resetSuccess"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = el.className.replace(" show","");
  });

  if (!password)              { showMsg("resetError","⚠️ กรุณากรอกรหัสผ่านใหม่"); return; }
  if (password.length < 6)   { showMsg("resetError","⚠️ รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร"); return; }
  if (password !== confirm)   { showMsg("resetError","⚠️ รหัสผ่านไม่ตรงกัน"); return; }

  const btn = document.getElementById("resetBtn");
  btn.disabled = true; btn.textContent = "⏳ กำลังบันทึก...";

  try {
    const res = await fetch(API + "/reset-password", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ token, password })
    });
    const d = await res.json();
    if (res.ok) {
      showMsg("resetSuccess","✅ " + d.message, "success");
      // redirect ไปหน้า login หลัง 2 วิ
      setTimeout(() => location.href = "auth.html", 2000);
    } else {
      showMsg("resetError","❌ " + (d.message || "เกิดข้อผิดพลาด"));
      btn.disabled = false; btn.textContent = "✅ บันทึกรหัสผ่านใหม่";
    }
  } catch {
    showMsg("resetError","❌ เชื่อมต่อ server ไม่ได้");
    btn.disabled = false; btn.textContent = "✅ บันทึกรหัสผ่านใหม่";
  }
}
</script>
</body>
</html>
