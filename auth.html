<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ | หนุ่มกล้ามทอง</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#ffd700; --gold2:#ffaa00; --dark:#080810; --dark2:#0f0f1a; --dark3:#161628; --dark4:#1e1e35;
  --text:#e8e8f0; --muted:#7070a0; --green:#22c55e; --red:#ef4444; --orange:#f97316;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Kanit',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
.bg { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse at 30% 40%, rgba(255,140,0,0.1) 0%, transparent 50%), radial-gradient(ellipse at 80% 70%, rgba(255,215,0,0.06) 0%, transparent 50%); }
.bg-grid { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px); background-size:40px 40px; }
nav { position:relative; z-index:10; background:rgba(8,8,16,0.9); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,215,0,0.15); padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between; }
.nav-logo { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:900; color:var(--gold); text-decoration:none; }
.nav-logo span { color:white; }
.nav-logo .icon { width:36px; height:36px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#000; }
.btn-back { padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:var(--dark3); color:var(--muted); font-family:'Kanit',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-back:hover { color:var(--text); }
.page { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1; }
.card { width:100%; max-width:420px; background:var(--dark3); border-radius:20px; border:1px solid rgba(255,255,255,0.08); padding:36px; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--orange), var(--gold), var(--orange)); }
.card-logo { text-align:center; margin-bottom:28px; }
.logo-icon { width:56px; height:56px; background:var(--gold); border-radius:14px; display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:10px; }
.logo-name { font-size:20px; font-weight:900; color:var(--gold); }
.logo-name span { color:white; }
.tabs { display:flex; gap:4px; background:var(--dark4); border-radius:10px; padding:4px; margin-bottom:28px; }
.tab { flex:1; padding:10px; border-radius:8px; border:none; background:transparent; color:var(--muted); font-family:'Kanit',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.tab.active { background:var(--dark3); color:var(--gold); box-shadow:0 1px 4px rgba(0,0,0,0.3); }
.form { display:flex; flex-direction:column; gap:16px; }
.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:13px; font-weight:600; color:var(--muted); }
.field-wrap { position:relative; }
.field-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
input[type=text], input[type=password], input[type=email] { width:100%; padding:12px 14px 12px 42px; background:var(--dark4); border:1px solid rgba(255,255,255,0.08); border-radius:10px; color:var(--text); font-family:'Kanit',sans-serif; font-size:14px; outline:none; transition:all 0.2s; }
input:focus { border-color:rgba(255,215,0,0.4); background:rgba(255,215,0,0.03); }
input::placeholder { color:var(--muted); }
.btn-submit { width:100%; padding:14px; border-radius:10px; border:none; background:linear-gradient(135deg, var(--orange), #ea6500); color:white; font-family:'Kanit',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:4px; }
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(249,115,22,0.4); }
.btn-submit:disabled { background:var(--dark4); color:var(--muted); transform:none; box-shadow:none; cursor:not-allowed; }
.divider { text-align:center; color:var(--muted); font-size:13px; position:relative; }
.divider::before, .divider::after { content:''; position:absolute; top:50%; width:38%; height:1px; background:rgba(255,255,255,0.06); }
.divider::before { left:0; } .divider::after { right:0; }
.error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px 14px; color:#fca5a5; font-size:13px; display:none; }
.error-msg.show { display:block; }
.success-msg { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:8px; padding:10px 14px; color:#86efac; font-size:13px; display:none; }
.success-msg.show { display:block; }
.terms { font-size:12px; color:var(--muted); text-align:center; }
.terms a { color:var(--gold); text-decoration:none; cursor:pointer; }
.forgot-link { text-align:right; margin-top:-6px; }
.forgot-link a { font-size:12px; color:var(--muted); cursor:pointer; transition:color 0.2s; }
.forgot-link a:hover { color:var(--gold); }
.hint-text { font-size:12px; color:var(--muted); line-height:1.7; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>
<nav>
  <a href="index.html" class="nav-logo">
    <div class="icon">🎮</div>
    <div>หนุ่ม<span>กล้ามทอง</span></div>
  </a>
  <button class="btn-back" onclick="location.href='index.html'">⬅ กลับหน้าแรก</button>
</nav>
<div class="page">
  <div class="card">
    <div class="card-logo">
      <div class="logo-icon">🎮</div>
      <div class="logo-name">หนุ่ม<span>กล้ามทอง</span></div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">🔑 เข้าสู่ระบบ</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">➕ สมัครสมาชิก</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="form">
      <div class="error-msg" id="loginError"></div>
      <div class="success-msg" id="loginSuccess"></div>
      <div class="field">
        <label>ชื่อผู้ใช้</label>
        <div class="field-wrap">
          <span class="field-icon">👤</span>
          <input type="text" id="loginUser" placeholder="กรอกชื่อผู้ใช้">
        </div>
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="loginPass" placeholder="กรอกรหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>
      <div class="forgot-link">
        <a onclick="switchTab('forgot')">🔑 ลืมรหัสผ่าน?</a>
      </div>
      <button class="btn-submit" id="loginBtn" onclick="doLogin()">🔑 เข้าสู่ระบบ</button>
      <div class="divider">หรือ</div>
      <div class="terms">ยังไม่มีบัญชี? <a onclick="switchTab('register')">สมัครสมาชิกฟรี</a></div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="form" style="display:none">
      <div class="error-msg" id="registerError"></div>
      <div class="success-msg" id="registerSuccess"></div>
      <div class="field">
        <label>ชื่อผู้ใช้</label>
        <div class="field-wrap">
          <span class="field-icon">👤</span>
          <input type="text" id="regUser" placeholder="ตั้งชื่อผู้ใช้">
        </div>
      </div>
      <div class="field">
        <label>Email <span style="color:var(--red)">*</span> <span style="color:var(--muted);font-weight:400;font-size:11px">(ใช้กู้รหัสผ่าน)</span></label>
        <div class="field-wrap">
          <span class="field-icon">📧</span>
          <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
      </div>
      <div class="field">
        <label>รหัสผ่าน</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="regPass" placeholder="ตั้งรหัสผ่าน (อย่างน้อย 6 ตัว)">
        </div>
      </div>
      <div class="field">
        <label>ยืนยันรหัสผ่าน</label>
        <div class="field-wrap">
          <span class="field-icon">🔐</span>
          <input type="password" id="regPass2" placeholder="ยืนยันรหัสผ่านอีกครั้ง" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
      </div>
      <button class="btn-submit" id="registerBtn" onclick="doRegister()">➕ สมัครสมาชิก</button>
      <div class="divider">หรือ</div>
      <div class="terms">มีบัญชีแล้ว? <a onclick="switchTab('login')">เข้าสู่ระบบ</a></div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotForm" class="form" style="display:none">
      <div class="error-msg" id="forgotError"></div>
      <div class="success-msg" id="forgotSuccess"></div>
      <div class="hint-text">
        กรอก Email ที่ใช้ตอนสมัครสมาชิก<br>
        ระบบจะส่งลิงก์รีเซ็ตรหัสผ่านไปให้ทาง Email ครับ (ลิงก์หมดอายุใน 30 นาที)
      </div>
      <div class="field">
        <label>Email</label>
        <div class="field-wrap">
          <span class="field-icon">📧</span>
          <input type="email" id="forgotEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doForgot()">
        </div>
      </div>
      <button class="btn-submit" id="forgotBtn" onclick="doForgot()">📧 ส่งลิงก์รีเซ็ต</button>
      <div class="divider">หรือ</div>
      <div class="terms"><a onclick="switchTab('login')">← กลับหน้าเข้าสู่ระบบ</a></div>
    </div>

  </div>
</div>

<script>
const API = "http://localhost:3000";

const params = new URLSearchParams(location.search);
if (params.get("mode") === "register") switchTab("register");
if (params.get("mode") === "forgot")   switchTab("forgot");

function switchTab(tab) {
  document.getElementById("loginForm").style.display    = tab === "login"    ? "flex" : "none";
  document.getElementById("registerForm").style.display = tab === "register" ? "flex" : "none";
  document.getElementById("forgotForm").style.display   = tab === "forgot"   ? "flex" : "none";
  document.getElementById("tabLogin").className    = "tab " + (tab === "login"    ? "active" : "");
  document.getElementById("tabRegister").className = "tab " + (tab === "register" ? "active" : "");
  clearMessages();
}

function clearMessages() {
  ["loginError","loginSuccess","registerError","registerSuccess","forgotError","forgotSuccess"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = el.className.replace(" show","");
  });
}

function showMsg(id, msg, type="error") {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = (type === "error" ? "error-msg" : "success-msg") + " show";
}

// ── LOGIN ──
async function doLogin() {
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value;
  clearMessages();
  if (!username || !password) { showMsg("loginError","⚠️ กรุณากรอกข้อมูลให้ครบ"); return; }
  const btn = document.getElementById("loginBtn");
  btn.disabled = true; btn.textContent = "⏳ กำลังเข้าสู่ระบบ...";
  try {
    const res = await fetch(API + "/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    });
    const d = await res.json();
    if (d.token) {
      localStorage.setItem("token", d.token);
      localStorage.setItem("username", d.username || username);
      localStorage.setItem("role", d.role || "user");
      const isAdmin = d.role === "admin";
      showMsg("loginSuccess", isAdmin ? "✅ กำลังพาไปหน้า Admin..." : "✅ เข้าสู่ระบบสำเร็จ!", "success");
      setTimeout(() => location.href = isAdmin ? "admin.html" : "index.html", 1200);
    } else {
      showMsg("loginError","❌ " + (d.message || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"));
      btn.disabled = false; btn.textContent = "🔑 เข้าสู่ระบบ";
    }
  } catch {
    showMsg("loginError","❌ เชื่อมต่อ server ไม่ได้");
    btn.disabled = false; btn.textContent = "🔑 เข้าสู่ระบบ";
  }
}

// ── REGISTER ──
async function doRegister() {
  const username = document.getElementById("regUser").value.trim();
  const email    = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPass").value;
  const confirm  = document.getElementById("regPass2").value;
  clearMessages();
  if (!username || !password) { showMsg("registerError","⚠️ กรุณากรอกข้อมูลให้ครบ"); return; }
  if (!email)                  { showMsg("registerError","⚠️ กรุณากรอก Email"); return; }
  if (password.length < 6)    { showMsg("registerError","⚠️ รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร"); return; }
  if (password !== confirm)    { showMsg("registerError","⚠️ รหัสผ่านไม่ตรงกัน"); return; }
  const btn = document.getElementById("registerBtn");
  btn.disabled = true; btn.textContent = "⏳ กำลังสมัคร...";
  try {
    const res = await fetch(API + "/register", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ username, password, email })
    });
    const d = await res.json();
    if (res.ok || d.message?.includes("สำเร็จ")) {
      showMsg("registerSuccess","✅ สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ","success");
      setTimeout(() => switchTab("login"), 1500);
    } else {
      showMsg("registerError","❌ " + (d.message || "สมัครไม่ได้ กรุณาลองใหม่"));
    }
  } catch {
    showMsg("registerError","❌ เชื่อมต่อ server ไม่ได้");
  }
  btn.disabled = false; btn.textContent = "➕ สมัครสมาชิก";
}

// ── FORGOT PASSWORD ──
async function doForgot() {
  const email = document.getElementById("forgotEmail").value.trim();
  clearMessages();
  if (!email) { showMsg("forgotError","⚠️ กรุณากรอก Email"); return; }
  const btn = document.getElementById("forgotBtn");
  btn.disabled = true; btn.textContent = "⏳ กำลังส่ง...";
  try {
    const res = await fetch(API + "/forgot-password", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email })
    });
    const d = await res.json();
    if (res.ok) {
      showMsg("forgotSuccess","✅ " + d.message, "success");
      document.getElementById("forgotEmail").value = "";
    } else {
      showMsg("forgotError","❌ " + (d.message || "เกิดข้อผิดพลาด"));
    }
  } catch {
    showMsg("forgotError","❌ เชื่อมต่อ server ไม่ได้");
  }
  btn.disabled = false; btn.textContent = "📧 ส่งลิงก์รีเซ็ต";
}
</script>
</body>
</html>
