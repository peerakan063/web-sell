<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โปรไฟล์ | หนุ่มกล้ามทอง</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#ffd700; --gold2:#ffaa00; --dark:#080810; --dark2:#0f0f1a;
  --dark3:#161628; --dark4:#1e1e35; --text:#e8e8f0; --muted:#7070a0;
  --green:#22c55e; --red:#ef4444; --orange:#f97316; --blue:#3b82f6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Kanit',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--dark2); }
::-webkit-scrollbar-thumb { background:var(--gold2); border-radius:3px; }

/* NAV */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(8,8,16,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,215,0,0.15);
  padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between;
}
.nav-logo { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:900; color:var(--gold); text-decoration:none; }
.nav-logo span { color:white; }
.nav-logo .icon { width:36px; height:36px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#000; }
.nav-right { display:flex; gap:8px; align-items:center; }
.btn-nav { padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:var(--dark3); color:var(--muted); font-family:'Kanit',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.btn-nav:hover { color:var(--text); }

/* PAGE */
.page { padding-top:80px; padding-bottom:60px; max-width:1000px; margin:0 auto; padding-left:20px; padding-right:20px; }

/* PROFILE HERO */
.profile-hero {
  background:var(--dark3); border-radius:16px;
  border:1px solid rgba(255,255,255,0.06);
  padding:28px; margin-bottom:20px;
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  position:relative; overflow:hidden;
}
.profile-hero::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--orange),var(--gold),var(--orange));
}
.avatar {
  width:72px; height:72px; border-radius:50%;
  background:linear-gradient(135deg,var(--orange),var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:900; color:#000; flex-shrink:0;
  border:3px solid rgba(255,215,0,0.3);
}
.profile-info { flex:1; }
.profile-username { font-size:22px; font-weight:900; color:white; margin-bottom:6px; }
.profile-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.tag { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; display:inline-flex; align-items:center; gap:4px; }
.tag.member   { background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); color:var(--blue); }
.tag.verified { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3); color:var(--green); }
.tag.admin    { background:rgba(255,215,0,0.15); border:1px solid rgba(255,215,0,0.3); color:var(--gold); }
.profile-date { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
.stat-card { background:var(--dark3); border-radius:14px; border:1px solid rgba(255,255,255,0.06); padding:20px; text-align:center; position:relative; overflow:hidden; }
.stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
.stat-card.blue::after  { background:var(--blue); }
.stat-card.green::after { background:var(--green); }
.stat-card.gold::after  { background:var(--gold); }
.stat-num { font-size:28px; font-weight:900; margin-bottom:4px; }
.stat-num.blue  { color:var(--blue); }
.stat-num.green { color:var(--green); }
.stat-num.gold  { color:var(--gold); }
.stat-label { font-size:12px; color:var(--muted); }

/* GRID */
.profile-grid { display:grid; grid-template-columns:1fr 340px; gap:16px; }
@media(max-width:760px) { .profile-grid { grid-template-columns:1fr; } .stats-row { grid-template-columns:1fr 1fr; } }

/* CARD */
.card { background:var(--dark3); border-radius:14px; border:1px solid rgba(255,255,255,0.06); padding:22px; margin-bottom:16px; }
.card:last-child { margin-bottom:0; }
.card-title { font-size:14px; font-weight:700; color:white; margin-bottom:18px; display:flex; align-items:center; gap:8px; }

/* FORM */
.field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.field:last-of-type { margin-bottom:0; }
.field label { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:0.5px; text-transform:uppercase; }
.field-wrap { position:relative; }
.field-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; color:var(--muted); }
input[type=text], input[type=password], input[type=email] {
  width:100%; padding:11px 14px 11px 38px;
  background:var(--dark4); border:1px solid rgba(255,255,255,0.08);
  border-radius:10px; color:var(--text); font-family:'Kanit',sans-serif;
  font-size:14px; outline:none; transition:all 0.2s;
}
input:focus { border-color:rgba(255,215,0,0.4); }
input::placeholder { color:var(--muted); }
input:disabled { opacity:0.5; cursor:not-allowed; }
.field-hint { font-size:11px; color:var(--muted); margin-top:4px; }

/* BUTTONS */
.btn-primary { padding:11px 20px; border-radius:9px; border:none; background:linear-gradient(135deg,var(--orange),#ea6500); color:white; font-family:'Kanit',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(249,115,22,0.4); }
.btn-primary:disabled { background:var(--dark4); color:var(--muted); transform:none; box-shadow:none; cursor:not-allowed; }
.btn-danger { padding:11px 20px; border-radius:9px; border:none; background:rgba(239,68,68,0.1); color:var(--red); font-family:'Kanit',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; border:1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background:rgba(239,68,68,0.2); }

/* INFO LIST */
.info-list { display:flex; flex-direction:column; gap:0; }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.info-row:last-child { border-bottom:none; }
.info-label { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:8px; }
.info-value { font-size:13px; font-weight:700; color:var(--text); text-align:right; }

/* MINI AVATAR */
.mini-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--orange),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:900; color:#000; margin-right:12px; flex-shrink:0; }

/* ALERTS */
.alert { border-radius:10px; padding:11px 14px; font-size:13px; font-weight:600; margin-bottom:14px; display:none; }
.alert.show { display:block; }
.alert.success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#86efac; }
.alert.error   { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; }

/* DIVIDER */
.section-divider { height:1px; background:rgba(255,255,255,0.06); margin:16px 0; }

.spinner { width:32px; height:32px; border-radius:50%; border:3px solid var(--dark4); border-top-color:var(--gold); animation:spin 0.8s linear infinite; margin:40px auto; }
@keyframes spin { to { transform:rotate(360deg); } }

.toast { position:fixed; bottom:24px; right:24px; z-index:999; padding:12px 18px; border-radius:10px; font-size:13px; font-weight:600; display:none; align-items:center; gap:8px; }
.toast.show { display:flex; }
.toast.success { background:#166534; border:1px solid #22c55e; color:#86efac; }
.toast.error   { background:#7f1d1d; border:1px solid #ef4444; color:#fca5a5; }

.eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); font-size:16px; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="icon">🎮</div>
    <div>หนุ่ม<span>กล้ามทอง</span></div>
  </a>
  <div class="nav-right">
    <a href="index.html" class="btn-nav">🏠 หน้าแรก</a>
    <a href="history.html" class="btn-nav">📋 คำสั่งซื้อ</a>
    <button class="btn-nav" style="border-color:rgba(239,68,68,0.3);color:#ef4444" onclick="confirmLogout()">🚪 ออก</button>
  </div>
</nav>

<div class="page">

  <!-- PROFILE HERO -->
  <div class="profile-hero" id="profileHero">
    <div class="spinner"></div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card blue">
      <div class="stat-num blue" id="statTotal">-</div>
      <div class="stat-label">คำสั่งซื้อทั้งหมด</div>
    </div>
    <div class="stat-card green">
      <div class="stat-num green" id="statConfirmed">-</div>
      <div class="stat-label">ยืนยันแล้ว</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-num gold" id="statSpend">-</div>
      <div class="stat-label">ยอดซื้อรวม</div>
    </div>
  </div>

  <div class="profile-grid">

    <!-- LEFT: แก้ไขข้อมูล -->
    <div>

      <!-- เปลี่ยนรหัสผ่าน -->
      <div class="card">
        <div class="card-title">🔒 เปลี่ยนรหัสผ่าน</div>
        <div class="alert" id="pwAlert"></div>
        <div class="field">
          <label>รหัสผ่านปัจจุบัน</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="currentPass" placeholder="กรอกรหัสผ่านปัจจุบัน">
            <button class="eye-btn" onclick="togglePass('currentPass',this)">👁</button>
          </div>
        </div>
        <div class="section-divider"></div>
        <div class="field">
          <label>รหัสผ่านใหม่</label>
          <div class="field-wrap">
            <span class="field-icon">🔑</span>
            <input type="password" id="newPass" placeholder="อย่างน้อย 6 ตัวอักษร">
            <button class="eye-btn" onclick="togglePass('newPass',this)">👁</button>
          </div>
        </div>
        <div class="field">
          <label>ยืนยันรหัสผ่านใหม่</label>
          <div class="field-wrap">
            <span class="field-icon">🔐</span>
            <input type="password" id="newPass2" placeholder="ยืนยันรหัสผ่านอีกครั้ง">
            <button class="eye-btn" onclick="togglePass('newPass2',this)">👁</button>
          </div>
        </div>
        <div style="margin-top:16px">
          <button class="btn-primary" id="pwBtn" onclick="changePassword()">💾 บันทึกรหัสผ่านใหม่</button>
        </div>
      </div>

      <!-- คำสั่งซื้อล่าสุด -->
      <div class="card">
        <div class="card-title">🛒 คำสั่งซื้อล่าสุด</div>
        <div id="recentOrdersList"><div class="spinner"></div></div>
        <div style="margin-top:14px">
          <a href="history.html" class="btn-primary" style="text-decoration:none">📋 ดูทั้งหมด</a>
        </div>
      </div>

    </div>

    <!-- RIGHT: ข้อมูลบัญชี -->
    <div>
      <div class="card">
        <div class="card-title">📋 ข้อมูลบัญชี</div>
        <div style="display:flex;align-items:center;margin-bottom:16px">
          <div class="mini-avatar" id="miniAvatar">?</div>
          <div>
            <div style="font-size:15px;font-weight:700" id="infoUsername">-</div>
            <div class="tag member" style="margin-top:4px" id="infoRole">สมาชิกทั่วไป</div>
          </div>
        </div>
        <div class="info-list" id="infoList">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- ออกจากระบบ -->
      <div class="card">
        <div class="card-title">⚠️ บัญชีของคุณ</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.7">
          หากต้องการออกจากระบบ กดปุ่มด้านล่างได้เลยครับ
        </p>
        <button class="btn-danger" onclick="confirmLogout()">🚪 ออกจากระบบ</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://web-sell-production.up.railway.app";
const token = localStorage.getItem("token");
if (!token) location.href = "auth.html";

let userData = null;

async function init() {
  try {
    // โหลดข้อมูล user และ orders พร้อมกัน
    const [meRes, ordersRes] = await Promise.all([
      fetch(API + "/me",         { headers:{ Authorization: token } }),
      fetch(API + "/my-orders",  { headers:{ Authorization: token } })
    ]);

    if (meRes.status === 401) { logout(); return; }

    userData = await meRes.json();
    const orders = await ordersRes.json();

    renderHero(userData);
    renderStats(orders);
    renderInfo(userData);
    renderRecentOrders(orders);

  } catch(e) {
    console.error(e);
    showToast("❌ โหลดข้อมูลไม่ได้", "error");
  }
}

function renderHero(u) {
  const initials = (u.username || "?").slice(0,2).toUpperCase();
  const joinDate = u.createdAt ? new Date(u.createdAt).toLocaleDateString("th-TH", { year:"numeric", month:"long", day:"numeric" }) : "-";
  const isAdmin = u.role === "admin";

  document.getElementById("profileHero").innerHTML = `
    <div class="avatar">${initials}</div>
    <div class="profile-info">
      <div class="profile-username">${u.username}</div>
      <div class="profile-tags">
        <span class="tag member">● สมาชิกทั่วไป</span>
        ${isAdmin ? '<span class="tag admin">👑 Admin</span>' : ""}
        ${u.email ? '<span class="tag verified">✓ ยืนยัน Email แล้ว</span>' : ""}
      </div>
      <div class="profile-date">📅 สมัครสมาชิกเมื่อ ${joinDate}</div>
    </div>`;
}

function renderStats(orders) {
  if (!Array.isArray(orders)) return;
  const confirmed = orders.filter(o => o.status === "confirmed");
  const totalSpend = confirmed.reduce((sum, o) => sum + Number(o.price||0), 0);

  document.getElementById("statTotal").textContent     = orders.length;
  document.getElementById("statConfirmed").textContent = confirmed.length;
  document.getElementById("statSpend").textContent     = "฿" + totalSpend.toLocaleString("th-TH", { minimumFractionDigits:2 });
}

function renderInfo(u) {
  const initials  = (u.username || "?").slice(0,2).toUpperCase();
  const joinDate  = u.createdAt ? new Date(u.createdAt).toLocaleDateString("th-TH") : "-";
  const isAdmin   = u.role === "admin";

  document.getElementById("miniAvatar").textContent   = initials;
  document.getElementById("infoUsername").textContent = u.username;
  document.getElementById("infoRole").textContent     = isAdmin ? "👑 Admin" : "สมาชิกทั่วไป";
  if (isAdmin) document.getElementById("infoRole").className = "tag admin";

  document.getElementById("infoList").innerHTML = `
    <div class="info-row">
      <span class="info-label">👤 ชื่อผู้ใช้</span>
      <span class="info-value">${u.username}</span>
    </div>
    <div class="info-row">
      <span class="info-label">📧 Email</span>
      <span class="info-value" style="font-size:12px">${u.email || "<span style='color:var(--muted)'>ไม่ได้ระบุ</span>"}</span>
    </div>
    <div class="info-row">
      <span class="info-label">🛡️ สิทธิ์</span>
      <span class="info-value">${isAdmin ? "Admin" : "สมาชิก"}</span>
    </div>
    <div class="info-row">
      <span class="info-label">📅 สมัครเมื่อ</span>
      <span class="info-value">${joinDate}</span>
    </div>`;
}

function renderRecentOrders(orders) {
  const cont = document.getElementById("recentOrdersList");
  if (!Array.isArray(orders) || !orders.length) {
    cont.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">ยังไม่มีคำสั่งซื้อ</div>`;
    return;
  }

  const statusMap = { pending:"⏳ รอชำระ", paid:"💳 รอยืนยัน", confirmed:"✅ ยืนยัน", rejected:"❌ ปฏิเสธ" };
  const statusColor = { pending:"var(--orange)", paid:"var(--blue)", confirmed:"var(--green)", rejected:"var(--red)" };

  const recent = orders.slice(0, 3);
  cont.innerHTML = recent.map(o => `
    <div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;color:var(--muted)">#${(o._id||"").slice(-6).toUpperCase()}</div>
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px">${o.detail || "-"}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:900;color:var(--gold)">฿${Number(o.price).toLocaleString()}</div>
        <div style="font-size:11px;font-weight:700;color:${statusColor[o.status]||'var(--muted)'}">${statusMap[o.status]||o.status}</div>
      </div>
    </div>`).join("");
}

// ── เปลี่ยนรหัสผ่าน ──
async function changePassword() {
  const currentPassword = document.getElementById("currentPass").value;
  const newPassword     = document.getElementById("newPass").value;
  const confirm         = document.getElementById("newPass2").value;

  const alert = document.getElementById("pwAlert");
  alert.className = "alert";

  if (!currentPassword || !newPassword) { showAlert("pwAlert","⚠️ กรุณากรอกข้อมูลให้ครบ","error"); return; }
  if (newPassword.length < 6)           { showAlert("pwAlert","⚠️ รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัว","error"); return; }
  if (newPassword !== confirm)           { showAlert("pwAlert","⚠️ รหัสผ่านไม่ตรงกัน","error"); return; }

  const btn = document.getElementById("pwBtn");
  btn.disabled = true; btn.textContent = "⏳ กำลังบันทึก...";

  try {
    const res = await fetch(API + "/change-password", {
      method:"POST",
      headers:{ "Content-Type":"application/json", Authorization: token },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const d = await res.json();
    if (res.ok) {
      showAlert("pwAlert","✅ " + d.message, "success");
      document.getElementById("currentPass").value = "";
      document.getElementById("newPass").value     = "";
      document.getElementById("newPass2").value    = "";
    } else {
      showAlert("pwAlert","❌ " + (d.message || "เกิดข้อผิดพลาด"), "error");
    }
  } catch {
    showAlert("pwAlert","❌ เชื่อมต่อ server ไม่ได้", "error");
  }
  btn.disabled = false; btn.textContent = "💾 บันทึกรหัสผ่านใหม่";
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `alert ${type} show`;
}

function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === "password") { input.type = "text"; btn.textContent = "🙈"; }
  else { input.type = "password"; btn.textContent = "👁"; }
}

function confirmLogout() {
  if (confirm("ต้องการออกจากระบบไหมครับ?")) logout();
}
function logout() { localStorage.clear(); location.href = "auth.html"; }

function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3000);
}

init();
</script>
</body>
</html>
