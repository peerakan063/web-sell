<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการสั่งซื้อ | หนุ่มกล้ามทอง</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#ffd700; --gold2:#ffaa00; --dark:#080810; --dark2:#0f0f1a;
  --dark3:#161628; --dark4:#1e1e35; --text:#e8e8f0; --muted:#7070a0;
  --green:#22c55e; --red:#ef4444; --orange:#f97316; --blue:#3b82f6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Kanit',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--dark2); }
::-webkit-scrollbar-thumb { background:var(--gold2); border-radius:3px; }

/* NAV */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(8,8,16,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,215,0,0.15);
  padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between;
}
.nav-logo { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:900; color:var(--gold); text-decoration:none; }
.nav-logo span { color:white; }
.nav-logo .icon { width:36px; height:36px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#000; }
.nav-right { display:flex; align-items:center; gap:10px; }
.btn-nav { padding:8px 16px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:var(--dark3); color:var(--muted); font-family:'Kanit',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.btn-nav:hover { color:var(--text); }

/* PAGE */
.page { padding-top:88px; padding-bottom:60px; max-width:860px; margin:0 auto; padding-left:20px; padding-right:20px; }
.page-header { margin-bottom:28px; }
.page-title { font-size:24px; font-weight:900; color:white; }
.page-sub { font-size:14px; color:var(--muted); margin-top:4px; }

/* ORDER CARD */
.order-card {
  background:var(--dark3); border-radius:16px;
  border:1px solid rgba(255,255,255,0.06);
  margin-bottom:16px; overflow:hidden;
  transition:border-color 0.2s;
}
.order-card.confirmed { border-color:rgba(34,197,94,0.25); }
.order-card.paid      { border-color:rgba(59,130,246,0.25); }
.order-card.rejected  { border-color:rgba(239,68,68,0.15); }

.order-header {
  padding:16px 20px; display:flex; align-items:center;
  justify-content:space-between; gap:12px; flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.order-id   { font-size:12px; color:var(--muted); font-weight:600; }
.order-date { font-size:12px; color:var(--muted); }

.badge { padding:5px 12px; border-radius:8px; font-size:12px; font-weight:700; display:inline-flex; align-items:center; gap:5px; }
.badge.pending   { background:rgba(249,115,22,0.15); color:var(--orange); }
.badge.paid      { background:rgba(59,130,246,0.15); color:var(--blue); }
.badge.confirmed { background:rgba(34,197,94,0.15); color:var(--green); }
.badge.rejected  { background:rgba(239,68,68,0.15); color:var(--red); }

.order-body { padding:20px; }
.order-detail { font-size:14px; color:var(--text); line-height:1.7; margin-bottom:12px; }
.order-price { font-size:22px; font-weight:900; color:var(--gold); }
.order-price-label { font-size:12px; color:var(--muted); }

/* SECRET BOX */
.secret-box {
  margin-top:16px; padding:16px 18px;
  border-radius:12px; border:1px solid rgba(34,197,94,0.3);
  background:rgba(34,197,94,0.05);
  position:relative;
}
.secret-box-title {
  font-size:12px; font-weight:700; color:var(--green);
  letter-spacing:1px; text-transform:uppercase;
  display:flex; align-items:center; gap:6px; margin-bottom:10px;
}
.secret-box-title::before { content:'🔓'; font-size:14px; }
.secret-content {
  font-size:14px; color:var(--text); line-height:1.8;
  white-space:pre-wrap; word-break:break-all;
  background:var(--dark4); border-radius:8px;
  padding:12px 14px; border:1px solid rgba(255,255,255,0.06);
  font-family:'Kanit',monospace;
}
.copy-btn {
  position:absolute; top:14px; right:14px;
  padding:5px 12px; border-radius:6px; border:none;
  background:rgba(34,197,94,0.15); color:var(--green);
  font-family:'Kanit',sans-serif; font-size:12px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.copy-btn:hover { background:rgba(34,197,94,0.3); }
.copy-btn.copied { background:rgba(34,197,94,0.3); color:white; }

/* WAITING BOX */
.waiting-box {
  margin-top:16px; padding:14px 16px;
  border-radius:12px; border:1px solid rgba(59,130,246,0.2);
  background:rgba(59,130,246,0.05);
  font-size:13px; color:var(--muted);
  display:flex; align-items:center; gap:10px;
}
.waiting-box .w-icon { font-size:18px; flex-shrink:0; }

/* REJECTED BOX */
.rejected-box {
  margin-top:16px; padding:14px 16px;
  border-radius:12px; border:1px solid rgba(239,68,68,0.2);
  background:rgba(239,68,68,0.05);
  font-size:13px; color:#fca5a5;
  display:flex; align-items:center; gap:10px;
}

/* EMPTY */
.empty { text-align:center; padding:80px 20px; color:var(--muted); }
.empty .e-icon { font-size:56px; margin-bottom:16px; }
.empty p { font-size:16px; font-weight:600; margin-bottom:8px; color:var(--text); }
.empty span { font-size:14px; }
.btn-shop { display:inline-flex; align-items:center; gap:8px; margin-top:20px; padding:12px 24px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--orange),#ea6500); color:white; font-family:'Kanit',sans-serif; font-size:14px; font-weight:700; cursor:pointer; text-decoration:none; }

.spinner { width:36px; height:36px; border-radius:50%; border:3px solid var(--dark4); border-top-color:var(--gold); animation:spin 0.8s linear infinite; margin:60px auto; }
@keyframes spin { to { transform:rotate(360deg); } }

.toast { position:fixed; bottom:24px; right:24px; z-index:999; padding:12px 18px; border-radius:10px; font-size:13px; font-weight:600; display:none; align-items:center; gap:8px; }
.toast.show { display:flex; }
.toast.success { background:#166534; border:1px solid #22c55e; color:#86efac; }
.toast.error   { background:#7f1d1d; border:1px solid #ef4444; color:#fca5a5; }

footer { background:var(--dark2); border-top:1px solid rgba(255,215,0,0.1); padding:24px 20px; text-align:center; color:var(--muted); font-size:13px; margin-top:60px; }
footer span { color:var(--gold); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="icon">🎮</div>
    <div>หนุ่ม<span>กล้ามทอง</span></div>
  </a>
  <div class="nav-right">
    <a href="index.html" class="btn-nav">🏠 หน้าแรก</a>
    <button class="btn-nav" onclick="confirmLogout()" style="border-color:rgba(239,68,68,0.3);color:#ef4444">🚪 ออกจากระบบ</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">📋 ประวัติการสั่งซื้อ</div>
    <div class="page-sub" id="pageSub">กำลังโหลด...</div>
  </div>
  <div id="orderList"><div class="spinner"></div></div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <p>© 2026 <span>หนุ่มกล้ามทอง</span> | ขายไอดีเกม คุณภาพดี ราคาสุดคุ้ม</p>
</footer>

<script>
const API = "https://web-sell-production.up.railway.app";

if (!localStorage.getItem("token")) location.href = "auth.html";

async function init() {
  const username = localStorage.getItem("username") || "";
  document.getElementById("pageSub").textContent = `สวัสดี ${username} · รายการสั่งซื้อทั้งหมดของคุณ`;

  try {
    const res = await fetch(API + "/my-orders", {
      headers: { Authorization: localStorage.getItem("token") }
    });

    if (res.status === 401) { logout(); return; }

    const orders = await res.json();
    if (!Array.isArray(orders) || !orders.length) {
      document.getElementById("orderList").innerHTML = `
        <div class="empty">
          <div class="e-icon">🛒</div>
          <p>ยังไม่มีรายการสั่งซื้อ</p>
          <span>เลือกซื้อสินค้าได้เลยครับ!</span><br>
          <a href="index.html" class="btn-shop">🎮 ไปเลือกสินค้า</a>
        </div>`;
      document.getElementById("pageSub").textContent = `${username} · ยังไม่มีรายการ`;
      return;
    }

    document.getElementById("pageSub").textContent = `${username} · ${orders.length} รายการ`;
    document.getElementById("orderList").innerHTML = orders.map(o => renderOrder(o)).join("");

  } catch (err) {
    document.getElementById("orderList").innerHTML = `
      <div class="empty">
        <div class="e-icon">❌</div>
        <p>โหลดข้อมูลไม่ได้</p>
        <span>กรุณาลองใหม่อีกครั้ง</span>
      </div>`;
  }
}

function renderOrder(o) {
  const date   = o.createdAt ? new Date(o.createdAt).toLocaleDateString("th-TH", { year:"numeric", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" }) : "-";
  const price  = Number(o.price).toLocaleString("th-TH", { minimumFractionDigits:2 });
  const shortId = (o._id || "").slice(-8).toUpperCase();

  const statusMap = {
    pending:   "⏳ รอชำระเงิน",
    paid:      "💳 รอแอดมินยืนยัน",
    confirmed: "✅ ยืนยันแล้ว",
    rejected:  "❌ ปฏิเสธ"
  };

  // กล่องด้านล่างตามสถานะ
  let bottomBox = "";
  if (o.status === "confirmed") {
    if (o.secret) {
      bottomBox = `
        <div class="secret-box">
          <div class="secret-box-title">ข้อมูลสินค้าของคุณ</div>
          <div class="secret-content" id="secret-${o._id}">${escHtml(o.secret)}</div>
          <button class="copy-btn" id="copybtn-${o._id}" onclick="copySecret('${o._id}')">📋 คัดลอก</button>
        </div>`;
    } else {
      bottomBox = `
        <div class="waiting-box">
          <span class="w-icon">✅</span>
          ออเดอร์ยืนยันแล้ว แอดมินจะติดต่อส่งข้อมูลให้เร็วๆ นี้ครับ
        </div>`;
    }
  } else if (o.status === "paid") {
    bottomBox = `
      <div class="waiting-box">
        <span class="w-icon">⏳</span>
        ส่งสลิปแล้ว กำลังรอแอดมินตรวจสอบและยืนยันครับ
      </div>`;
  } else if (o.status === "pending") {
    bottomBox = `
      <div class="waiting-box">
        <span class="w-icon">💳</span>
        กรุณาโอนเงินและอัพโหลดสลิปที่หน้า <a href="payment.html" style="color:var(--gold)">ชำระเงิน</a>
      </div>`;
  } else if (o.status === "rejected") {
    bottomBox = `
      <div class="rejected-box">
        <span>❌</span>
        ออเดอร์ถูกปฏิเสธ กรุณาติดต่อแอดมินเพื่อสอบถามครับ
      </div>`;
  }

  return `
    <div class="order-card ${o.status}">
      <div class="order-header">
        <div>
          <div class="order-id">รหัสออเดอร์ #${shortId}</div>
          <div class="order-date">📅 ${date}</div>
        </div>
        <span class="badge ${o.status}">${statusMap[o.status] || o.status}</span>
      </div>
      <div class="order-body">
        <div class="order-detail">${escHtml(o.detail || "-")}</div>
        <div class="order-price">฿${price}</div>
        <div class="order-price-label">ราคาที่ชำระ</div>
        ${bottomBox}
      </div>
    </div>`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\n/g,"<br>");
}

function copySecret(orderId) {
  const el  = document.getElementById("secret-" + orderId);
  const btn = document.getElementById("copybtn-" + orderId);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    btn.textContent = "✅ คัดลอกแล้ว";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "📋 คัดลอก"; btn.classList.remove("copied"); }, 2000);
  }).catch(() => showToast("❌ คัดลอกไม่ได้", "error"));
}

function logout() {
  localStorage.clear();
  location.href = "auth.html";
}

function confirmLogout() {
  if (confirm("ต้องการออกจากระบบไหมครับ?")) logout();
}

function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3000);
}

init();
</script>
</body>
</html>
