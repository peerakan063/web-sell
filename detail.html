<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดสินค้า | หนุ่มกล้ามทอง</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#ffd700; --gold2:#ffaa00; --dark:#080810; --dark2:#0f0f1a;
  --dark3:#161628; --dark4:#1e1e35; --text:#e8e8f0; --muted:#7070a0;
  --green:#22c55e; --red:#ef4444; --orange:#f97316;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Kanit',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--dark2); }
::-webkit-scrollbar-thumb { background:var(--gold2); border-radius:3px; }
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background:rgba(8,8,16,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,215,0,0.15);
  padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between;
}
.nav-logo { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:900; color:var(--gold); text-decoration:none; }
.nav-logo span { color:white; }
.nav-logo .icon { width:36px; height:36px; background:var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#000; }
.btn-back { padding:8px 18px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:var(--dark3); color:var(--muted); font-family:'Kanit',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
.btn-back:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }
.page { padding-top:88px; padding-bottom:60px; max-width:1100px; margin:0 auto; padding-left:20px; padding-right:20px; }
.breadcrumb { font-size:13px; color:var(--muted); margin-bottom:24px; }
.breadcrumb a { color:var(--muted); text-decoration:none; }
.breadcrumb a:hover { color:var(--gold); }
.breadcrumb span { margin:0 8px; }
.detail-grid { display:grid; grid-template-columns:1fr 420px; gap:32px; align-items:start; }
@media(max-width:900px) { .detail-grid { grid-template-columns:1fr; } }
.slideshow-wrap { position:sticky; top:84px; }
.main-slide { position:relative; border-radius:16px; overflow:hidden; background:var(--dark3); border:1px solid rgba(255,255,255,0.06); aspect-ratio:16/10; }
.main-slide img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity 0.35s ease, transform 0.35s ease; }
.main-slide img.fade-out { opacity:0; transform:scale(1.02); }
.main-slide-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:64px; color:rgba(255,215,0,0.15); }
.slide-arrow { position:absolute; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.15); color:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; backdrop-filter:blur(4px); z-index:5; }
.slide-arrow:hover { background:rgba(255,215,0,0.3); border-color:rgba(255,215,0,0.5); }
.slide-arrow.prev { left:12px; } .slide-arrow.next { right:12px; } .slide-arrow.hidden { display:none; }
.slide-counter { position:absolute; bottom:12px; right:12px; background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.15); padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; color:white; backdrop-filter:blur(4px); }
.slide-status { position:absolute; top:12px; left:12px; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px; }
.slide-status.available { background:rgba(34,197,94,0.9); color:white; }
.slide-status.sold { background:rgba(239,68,68,0.9); color:white; }
.slide-status .dot { width:6px; height:6px; border-radius:50%; background:white; animation:pulse-dot 1.5s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
.slide-dots { display:flex; justify-content:center; gap:6px; margin-top:12px; flex-wrap:wrap; }
.slide-dot { width:8px; height:8px; border-radius:50%; background:var(--dark4); border:1px solid rgba(255,255,255,0.15); cursor:pointer; transition:all 0.2s; }
.slide-dot.active { background:var(--gold); border-color:var(--gold); transform:scale(1.2); }
.thumb-strip { display:grid; grid-template-columns:repeat(auto-fill, minmax(72px,1fr)); gap:8px; margin-top:12px; }
.thumb-item { aspect-ratio:1; border-radius:8px; overflow:hidden; border:2px solid rgba(255,255,255,0.06); cursor:pointer; transition:all 0.2s; background:var(--dark4); }
.thumb-item:hover { border-color:rgba(255,215,0,0.4); transform:scale(1.04); }
.thumb-item.active { border-color:var(--gold); box-shadow:0 0 10px rgba(255,215,0,0.3); }
.thumb-item img { width:100%; height:100%; object-fit:cover; display:block; }
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:300; display:none; align-items:center; justify-content:center; cursor:zoom-out; backdrop-filter:blur(8px); }
.lightbox.open { display:flex; }
.lightbox img { max-width:90vw; max-height:88vh; object-fit:contain; border-radius:10px; cursor:default; }
.lightbox-close { position:fixed; top:20px; right:24px; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.lightbox-close:hover { background:rgba(239,68,68,0.4); }
.lightbox-nav { position:fixed; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.lightbox-nav:hover { background:rgba(255,215,0,0.3); }
.lightbox-nav.lb-prev { left:20px; } .lightbox-nav.lb-next { right:20px; }
.game-tag { display:inline-block; padding:4px 12px; border-radius:6px; background:rgba(249,115,22,0.15); border:1px solid rgba(249,115,22,0.3); color:var(--orange); font-size:11px; font-weight:700; letter-spacing:1.5px; margin-bottom:12px; }
.product-title { font-size:clamp(18px,3vw,26px); font-weight:900; color:white; line-height:1.4; margin-bottom:10px; }
.product-id { font-size:13px; color:var(--muted); margin-bottom:20px; }
.product-price { font-size:40px; font-weight:900; color:var(--gold); margin-bottom:6px; line-height:1; }
.product-price-label { font-size:13px; color:var(--muted); margin-bottom:24px; }
.divider { height:1px; background:rgba(255,255,255,0.06); margin:20px 0; }
.product-desc-title { font-size:14px; font-weight:700; color:var(--muted); margin-bottom:10px; letter-spacing:1px; text-transform:uppercase; }
.product-desc { font-size:14px; color:var(--text); line-height:1.8; }
.buy-card { background:var(--dark3); border-radius:14px; border:1px solid rgba(255,215,0,0.12); padding:20px; margin-top:24px; }
.buy-card-title { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:14px; letter-spacing:1px; text-transform:uppercase; }
.btn-buy { width:100%; padding:16px; border-radius:12px; border:none; background:linear-gradient(135deg, var(--orange), #ea6500); color:white; font-family:'Kanit',sans-serif; font-size:16px; font-weight:900; cursor:pointer; transition:all 0.25s; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px; }
.btn-buy:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(249,115,22,0.5); }
.btn-buy:disabled { background:var(--dark4); color:var(--muted); transform:none; box-shadow:none; cursor:not-allowed; }
.btn-contact { width:100%; padding:12px; border-radius:12px; border:1px solid rgba(255,215,0,0.3); background:transparent; color:var(--gold); font-family:'Kanit',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none; }
.btn-contact:hover { background:rgba(255,215,0,0.08); }
.guarantee-list { margin-top:16px; display:flex; flex-direction:column; gap:8px; }
.guarantee-item { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted); }
.guarantee-item .g-icon { font-size:16px; flex-shrink:0; }
.loading { text-align:center; padding:80px 20px; color:var(--muted); }
.spinner { width:40px; height:40px; border-radius:50%; border:3px solid var(--dark4); border-top-color:var(--gold); animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.toast { position:fixed; bottom:24px; right:24px; z-index:400; padding:14px 20px; border-radius:10px; font-size:14px; font-weight:600; display:none; align-items:center; gap:10px; max-width:320px; }
.toast.show { display:flex; }
.toast.success { background:#166534; border:1px solid #22c55e; color:#86efac; }
.toast.error { background:#7f1d1d; border:1px solid #ef4444; color:#fca5a5; }
footer { background:var(--dark2); border-top:1px solid rgba(255,215,0,0.1); padding:24px 20px; text-align:center; color:var(--muted); font-size:13px; margin-top:60px; }
footer span { color:var(--gold); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="icon">🎮</div>
    <div>หนุ่ม<span>กล้ามทอง</span></div>
  </a>
  <button class="btn-back" onclick="history.back()">← กลับ</button>
</nav>

<div class="page">
  <div class="breadcrumb">
    <a href="index.html">🏠 หน้าแรก</a>
    <span>›</span>
    <a href="index.html#shop">ร้านค้า</a>
    <span>›</span>
    <span id="breadTitle">รายละเอียดสินค้า</span>
  </div>
  <div id="pageContent">
    <div class="loading"><div class="spinner"></div>กำลังโหลดสินค้า...</div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open');document.body.style.overflow=''">✕</button>
  <button class="lightbox-nav lb-prev" onclick="lbNav(-1);event.stopPropagation()">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lightbox-nav lb-next" onclick="lbNav(1);event.stopPropagation()">›</button>
</div>

<div class="toast" id="toast"></div>

<footer>
  <p>© 2026 <span>หนุ่มกล้ามทอง</span> | ขายไอดีเกม คุณภาพดี ราคาสุดคุ้ม</p>
</footer>

<script>
const API = "http://localhost:3000";
let product = null;
let images = [];
let currentSlide = 0;
let lbIndex = 0;

async function init() {
  const id = localStorage.getItem("view_id");
  if (!id) { location.href = "index.html"; return; }
  try {
    const res = await fetch(API + "/accounts/" + id);
    product = await res.json();
    images = product.images?.length ? product.images.map(i => API + i)
           : product.image ? [API + product.image]
           : [];
    renderPage();
  } catch {
    document.getElementById("pageContent").innerHTML =
      `<div class="loading"><div style="font-size:48px;margin-bottom:16px">❌</div><p>โหลดสินค้าไม่ได้</p></div>`;
  }
}

function renderPage() {
  const isSold = product.status === "sold";
  const price  = Number(product.price).toLocaleString();
  const date   = product.createdAt ? new Date(product.createdAt).toLocaleDateString("th-TH") : "-";
  document.getElementById("breadTitle").textContent = product.detail || "สินค้า";

  document.getElementById("pageContent").innerHTML = `
    <div class="detail-grid">
      <div class="slideshow-wrap">
        <div class="main-slide" id="mainSlide">
          ${images.length
            ? `<img src="${images[0]}" id="mainImg" alt="รูปสินค้า" onclick="openLightbox(0)" style="cursor:zoom-in">`
            : `<div class="main-slide-placeholder">🎮</div>`}
          ${images.length > 1 ? `
            <button class="slide-arrow prev hidden" id="prevBtn" onclick="changeSlide(-1)">‹</button>
            <button class="slide-arrow next" id="nextBtn" onclick="changeSlide(1)">›</button>
            <div class="slide-counter" id="slideCounter">1 / ${images.length}</div>
          ` : ""}
          <div class="slide-status ${isSold ? 'sold' : 'available'}">
            ${isSold ? '' : '<span class="dot"></span>'}
            ${isSold ? '❌ ขายแล้ว' : 'พร้อมขาย'}
          </div>
        </div>
        ${images.length > 1 ? `
          <div class="slide-dots" id="slideDots">
            ${images.map((_,i) => `<div class="slide-dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join("")}
          </div>
          <div class="thumb-strip" id="thumbStrip">
            ${images.map((src,i) => `
              <div class="thumb-item ${i===0?'active':''}" onclick="goToSlide(${i})" id="thumb-${i}">
                <img src="${src}" alt="thumb ${i+1}">
              </div>`).join("")}
          </div>
        ` : ""}
      </div>

      <div class="product-info">
        <div class="game-tag">${(product.game || 'FREEFIRE').toUpperCase()}</div>
        <div class="product-title">${product.detail || 'ไอดีเกม'}</div>
        <div class="product-id">🔖 รหัสสินค้า: ${(product._id||'').slice(-8).toUpperCase()}</div>
        <div class="product-price">฿${price}</div>
        <div class="product-price-label">ราคาสุดท้าย · ไม่มีค่าธรรมเนียมเพิ่มเติม</div>
        <div class="divider"></div>
        <div class="product-desc-title">📋 รายละเอียด</div>
        <div class="product-desc">${(product.detail || '').replace(/\n/g,'<br>')}</div>
        <div class="buy-card">
          <div class="buy-card-title">🛒 สั่งซื้อสินค้า</div>
          <button class="btn-buy" id="buyBtn" ${isSold ? 'disabled' : ''} onclick="buyNow()">
            ${isSold ? '❌ สินค้าขายแล้ว' : '🛒 ซื้อเลย · ฿' + price}
          </button>
          <a href="contact.html" class="btn-contact">💬 สอบถามก่อนซื้อ</a>
          <div class="guarantee-list">
            <div class="guarantee-item"><span class="g-icon">✅</span>ตรวจสอบและรับประกันสินค้าทุกชิ้น</div>
            <div class="guarantee-item"><span class="g-icon">⚡</span>ส่งมอบทันทีหลังยืนยันการชำระเงิน</div>
            <div class="guarantee-item"><span class="g-icon">🔒</span>ระบบปลอดภัย 100%</div>
            <div class="guarantee-item"><span class="g-icon">📅</span>วันที่ลง: ${date}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function changeSlide(dir) { goToSlide(currentSlide + dir); }

function goToSlide(index) {
  if (!images.length || index < 0 || index >= images.length) return;
  const mainImg = document.getElementById("mainImg");
  if (mainImg) {
    mainImg.classList.add("fade-out");
    setTimeout(() => {
      mainImg.src = images[index];
      mainImg.classList.remove("fade-out");
      mainImg.onclick = () => openLightbox(index);
    }, 200);
  }
  currentSlide = index;
  const prev = document.getElementById("prevBtn");
  const next = document.getElementById("nextBtn");
  if (prev) prev.classList.toggle("hidden", index === 0);
  if (next) next.classList.toggle("hidden", index === images.length - 1);
  const counter = document.getElementById("slideCounter");
  if (counter) counter.textContent = `${index+1} / ${images.length}`;
  document.querySelectorAll(".slide-dot").forEach((d,i)  => d.classList.toggle("active", i===index));
  document.querySelectorAll(".thumb-item").forEach((t,i) => t.classList.toggle("active", i===index));
}

document.addEventListener("keydown", e => {
  if (document.getElementById("lightbox").classList.contains("open")) {
    if (e.key === "ArrowLeft")  lbNav(-1);
    if (e.key === "ArrowRight") lbNav(1);
    if (e.key === "Escape") { document.getElementById("lightbox").classList.remove("open"); document.body.style.overflow=""; }
  } else {
    if (e.key === "ArrowLeft")  changeSlide(-1);
    if (e.key === "ArrowRight") changeSlide(1);
  }
});

function openLightbox(index) {
  if (!images.length) return;
  lbIndex = index;
  document.getElementById("lbImg").src = images[index];
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLightbox(e) {
  if (e && e.target !== document.getElementById("lightbox")) return;
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
}
function lbNav(dir) {
  lbIndex = (lbIndex + dir + images.length) % images.length;
  document.getElementById("lbImg").src = images[lbIndex];
}

// ===== BUY =====
async function buyNow() {
  const token = localStorage.getItem("token");
  if (!token) {
    showToast("⚠️ กรุณาเข้าสู่ระบบก่อน", "error");
    setTimeout(() => location.href = "auth.html", 1500);
    return;
  }
  const btn = document.getElementById("buyBtn");
  btn.disabled = true;
  btn.textContent = "⏳ กำลังดำเนินการ...";
  try {
    const res = await fetch(API + "/order/create", {   // ✅ แก้ /order → /order/create
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: token                           // ✅ ไม่มี "Bearer "
      },
      body: JSON.stringify({ account_id: product._id })
    });
    const d = await res.json();
    if (res.ok) {
      const orderId = d.order?._id || "";              // ✅ backend ส่ง { order:{...}, price:... }
      localStorage.setItem("order_id", orderId);
      showToast("✅ สร้างออเดอร์แล้ว! กรุณาโอนเงินและอัพสลิป");
      setTimeout(() => location.href = "payment.html", 1500);
    } else {
      showToast("❌ " + (d.message || "เกิดข้อผิดพลาด"), "error");
      btn.disabled = false;
      btn.textContent = `🛒 ซื้อเลย · ฿${Number(product.price).toLocaleString()}`;
    }
  } catch {
    showToast("❌ เชื่อมต่อ server ไม่ได้", "error");
    btn.disabled = false;
    btn.textContent = `🛒 ซื้อเลย · ฿${Number(product.price).toLocaleString()}`;
  }
}

function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3500);
}

init();
</script>
</body>
</html>
